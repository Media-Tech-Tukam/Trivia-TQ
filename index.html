<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIVIA CHALLENGE</title>

<body class="bg-intro">
<div class="stars"></div>
<div class="grid-overlay"></div>

<div id="app">

  <!-- SPLASH -->
  <div id="splash-screen">
    <img id="splash-img" src="img/splash-1.webp" alt="">
  </div>

  <!-- BACKGROUND MUSIC -->
  <audio id="bg-music" loop>
    <source src="audio/music.webm" type="audio/webm">
    <source src="audio/music.mp3"  type="audio/mpeg">
  </audio>

  <!-- INTRO -->
  <div id="intro-screen" class="screen">
    <button class="btn-iniciar" onclick="startGame()">
      <img src="img/btn-iniciar.png" alt="INICIAR JUEGO">
    </button>
  </div>

  <!-- GAME -->
  <div id="game-screen" class="screen lvl1">

    

    <div class="question-card">
      <div class="question-text" id="question-text">Cargando...</div>
    </div>

    <div class="game-header">
      <div class="helps-row">
        <button class="help-btn help-btn-change" id="help-change" onclick="useChangeQuestion()"></button>
        <button class="help-btn help-btn-5050" id="help-5050" onclick="use5050()"></button>
      </div>
      <div class="header-right">
        <div class="level-badge">

      </div>
    </div>

    <div class="answers-grid" id="answers-grid"></div>

    
  </div>

  <!-- LOSS -->
  <div id="loss-screen" class="screen">
    <video id="loss-video" class="screen-video" src="img/gameover.mp4" loop muted playsinline></video>
    <img class="screen-overlay" src="img/overlay-gameover.png" alt="">
    <button class="btn-loss-replay" onclick="resetGame()">JUGAR DE NUEVO</button>
  </div>

  <!-- WIN -->
  <div id="win-screen" class="screen">
    <button class="btn-loss-replay" onclick="resetGame()">NUEVA PARTIDA</button>
    <div class="win-particles" id="win-particles"></div>
  </div>

</div>

<!-- LEVEL TRANSITION -->
<div class="level-transition" id="level-transition">
  <img class="lt-bg" src="img/level-transition-bg.webp" alt="">
  <img class="lt-level-img" id="lt-level-img" src="" alt="">
</div>

    { q: "Al disolver <strong>TRAVAD PIK</strong> en agua, ¿qué características tiene la solución?", opts: ["Turbio grisáceo, olor a naranja, temperatura caliente", "Claro anaranjado, olor a naranja, temperatura caliente", "Turbio grisáceo, olor a naranja, temperatura fría", "Claro anaranjado, olor a naranja, temperatura fría"], a: 0 },

const ALL_QUESTIONS = { 1: [], 2: [], 3: [], 4: [] };

// ===== STATE =====
let state = {};

function shuffleBank() {
  const meds = Object.keys(BANK_BY_MED).sort(() => Math.random() - 0.5);
  for (let lvl = 1; lvl <= 4; lvl++) {
    const medBank = BANK_BY_MED[meds[lvl - 1]];
    const picked = medBank[Math.floor(Math.random() * medBank.length)];
    ALL_QUESTIONS[lvl] = [picked];
  }
  // swapPool: una pregunta alternativa por medicamento para la ayuda "cambiar pregunta"
  ALL_QUESTIONS.swapPool = meds.map((med, i) => {
    const bank = BANK_BY_MED[med];
    const already = ALL_QUESTIONS[i + 1][0];
    const others = bank.filter(q => q !== already);
    return others[Math.floor(Math.random() * others.length)];
  });
  ALL_QUESTIONS.swapUsed = 0;
}

function initState() {
  shuffleBank();
  state = {
    level: 1,
    questionIndex: 0,
    score: 0,
    helpChange: true,
    help5050: true,
    timer: TIMER_PER_LEVEL[1],
    timerMax: TIMER_PER_LEVEL[1],
    timerInterval: null,
    usedQuestions: { 1: [], 2: [], 3: [], 4: [] },
    currentQuestion: null,
    locked: false,
  };
}

// ===== AUDIO (Web Audio API) =====
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, vol = 0.15, delay = 0) {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime + delay);
    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    o.start(ctx.currentTime + delay);
    o.stop(ctx.currentTime + delay + duration + 0.05);
  } catch(e) {}
}

function soundClick() { playTone(440, 'sine', 0.08, 0.08); }
function soundCorrect() {
  playTone(523, 'sine', 0.15, 0.15);
  playTone(659, 'sine', 0.15, 0.15, 0.12);
  playTone(784, 'sine', 0.2, 0.15, 0.24);
}
function soundWrong() {
  playTone(200, 'sawtooth', 0.3, 0.15);
  playTone(150, 'sawtooth', 0.4, 0.12, 0.15);
}
function soundLevelUp() {
  [523,587,659,698,784].forEach((f,i) => playTone(f, 'sine', 0.15, 0.12, i*0.1));
}
function soundWin() {
  [523,659,784,1047].forEach((f,i) => playTone(f,'sine',0.3,0.15,i*0.12));
  setTimeout(() => [784,1047,1319].forEach((f,i) => playTone(f,'sine',0.25,0.15,i*0.1)), 600);
}
function soundTick() { playTone(880, 'square', 0.03, 0.04); }

// ===== BACKGROUND MUSIC =====
const BG_MUSIC_HIGH = 0.8;  // volumen normal
const BG_MUSIC_LOW  = 0.2;  // volumen durante preguntas
let bgFadeInterval = null;

function bgMusicStart() {
  const music = document.getElementById('bg-music');
  music.volume = BG_MUSIC_HIGH;
  music.currentTime = 0;
  music.play().catch(() => {});
}

function bgMusicStop() {
  const music = document.getElementById('bg-music');
  clearInterval(bgFadeInterval);
  music.pause();
  music.currentTime = 0;
}

function bgMusicFadeTo(targetVol, duration = 800) {
  const music = document.getElementById('bg-music');
  clearInterval(bgFadeInterval);
  const steps    = 20;
  const interval = duration / steps;
  const delta    = (targetVol - music.volume) / steps;
  bgFadeInterval = setInterval(() => {
    const next = music.volume + delta;
    if ((delta > 0 && next >= targetVol) || (delta < 0 && next <= targetVol)) {
      music.volume = targetVol;
      clearInterval(bgFadeInterval);
    } else {
      music.volume = Math.max(0, Math.min(1, next));
    }
  }, interval);
}

// ===== HELPERS =====
const BG_MAP = {
  'intro-screen': 'bg-intro',
  'game-screen':  'bg-game',
  'loss-screen':  'bg-loss',
  'win-screen':   'bg-win',
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.body.classList.remove('bg-intro', 'bg-game', 'bg-loss', 'bg-win');
  if (BG_MAP[id]) document.body.classList.add(BG_MAP[id]);

  // Manejo del video de fondo en loss-screen
  const lossVideo = document.getElementById('loss-video');
  if (lossVideo) {
    if (id === 'loss-screen') {
      lossVideo.currentTime = 0;
      lossVideo.play();
    } else {
      lossVideo.pause();
    }
  }
}

function getRandomQuestion(level) {
  const pool = ALL_QUESTIONS[level].filter((_, i) => !state.usedQuestions[level].includes(i));
  if (pool.length === 0) {
    state.usedQuestions[level] = [];
    return { q: ALL_QUESTIONS[level][0], idx: 0 };
  }
  const poolIdx = Math.floor(Math.random() * pool.length);
  const realIdx = ALL_QUESTIONS[level].indexOf(pool[poolIdx]);
  return { q: ALL_QUESTIONS[level][realIdx], idx: realIdx };
}

function updateLevelTheme(level) {
  const gs = document.getElementById('game-screen');
  const isActive = gs.classList.contains('active');
  gs.className = 'screen lvl' + level + (isActive ? ' active' : '');
  document.getElementById('level-name').textContent = LEVEL_NAMES[level];
}

function renderQuestion() {
  const { q, idx } = getRandomQuestion(state.level);
  state.currentQuestion = { ...q, idx };
  state.usedQuestions[state.level].push(idx);

  document.getElementById('question-text').innerHTML = q.q;

  // answers
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="answer-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => { soundClick(); selectAnswer(i, btn); };
    grid.appendChild(btn);
  });

  updateLevelTheme(state.level);
  startTimer();
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timerMax = TIMER_PER_LEVEL[state.level];
  state.timer = state.timerMax;
  updateTimerUI();
  state.timerInterval = setInterval(() => {
    state.timer--;
    updateTimerUI();
    if (state.timer <= 5) soundTick();
    if (state.timer <= 0) {
      clearInterval(state.timerInterval);
      timeOut();
    }
  }, 1000);
}

function updateTimerUI() {
  const el = document.getElementById('timer');
  const bar = document.getElementById('timer-bar');
  el.textContent = state.timer;
  const pct = (state.timer / state.timerMax) * 100;
  bar.style.width = pct + '%';
  el.classList.toggle('danger', state.timer <= 5);
  if (state.timer <= 5) bar.style.background = 'var(--wrong)';
  else bar.style.background = 'var(--lvl-color, var(--accent))';
}

function timeOut() {
  if (state.locked) return;
  state.locked = true;
  soundWrong();
  disableAnswers();
  setTimeout(() => endGame(false), 1000);
}

function selectAnswer(idx, btn) {
  if (state.locked) return;
  state.locked = true;
  clearInterval(state.timerInterval);

  const correct = state.currentQuestion.a;
  const allBtns = document.querySelectorAll('.answer-btn');

  if (idx === correct) {
    btn.classList.add('selected-correct');
    soundCorrect();
    setTimeout(() => nextQuestion(), 1200);
  } else {
    btn.classList.add('selected-wrong');
    allBtns[correct].classList.add('reveal-correct');
    soundWrong();
    setTimeout(() => endGame(false), 1500);
  }
}

function disableAnswers() {
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
  const correct = state.currentQuestion.a;
  document.querySelectorAll('.answer-btn')[correct]?.classList.add('reveal-correct');
}

function nextQuestion() {
  state.questionIndex++;
  const total = QUESTIONS_PER_LEVEL[state.level];

  if (state.questionIndex >= total) {
    // Level complete
    const prevLevel = state.level;
    state.level++;
    state.questionIndex = 0;

    if (prevLevel === 4) {
      endGame(true);
    } else {
      showLevelTransition(state.level);
    }
  } else {
    state.locked = false;
    renderQuestion();
  }
}

function showLevelTransition(level) {
  soundLevelUp();
  const lt = document.getElementById('level-transition');
  const gs = document.getElementById('game-screen');
  const isActive = gs.classList.contains('active');
  gs.className = 'screen lvl' + level + (isActive ? ' active' : '');

  document.getElementById('lt-level-img').src = 'img/level-' + level + '.png';
  lt.className = 'level-transition lvl' + level + ' show';

  setTimeout(() => {
    lt.classList.remove('show');
    state.locked = false;
    renderQuestion();
  }, 2000);
}

function endGame(win) {
  clearInterval(state.timerInterval);
  bgMusicFadeTo(BG_MUSIC_HIGH, 1000);
  if (win) {
    soundWin();
    showScreen('win-screen');
    spawnParticles();
  } else {
    showScreen('loss-screen');
  }
}

function useChangeQuestion() {
  if (!state.helpChange || state.locked) return;
  soundClick();
  state.helpChange = false;
  document.getElementById('help-change').disabled = true;
  clearInterval(state.timerInterval);

  // Swap current question with next from swapPool
  const swapIdx = ALL_QUESTIONS.swapUsed;
  if (swapIdx < ALL_QUESTIONS.swapPool.length) {
    const newQ = ALL_QUESTIONS.swapPool[swapIdx];
    ALL_QUESTIONS.swapUsed++;
    // Replace current slot in level with the swap question
    const levelQ = ALL_QUESTIONS[state.level];
    levelQ[state.questionIndex] = newQ;
    // Remove the previously registered index so renderQuestion picks fresh
    state.usedQuestions[state.level].pop();
  }

  state.locked = false;
  renderQuestion();
}

function use5050() {
  if (!state.help5050 || state.locked) return;
  soundClick();
  state.help5050 = false;
  document.getElementById('help-5050').disabled = true;

  const correct = state.currentQuestion.a;
  const btns = [...document.querySelectorAll('.answer-btn')];
  const wrongIdxs = btns.map((_,i) => i).filter(i => i !== correct);
  // eliminate 2 random wrong answers
  const toElim = wrongIdxs.sort(() => Math.random() - 0.5).slice(0, 2);
  toElim.forEach(i => btns[i].classList.add('eliminated'));
}

function spawnParticles() {
  const container = document.getElementById('win-particles');
  container.innerHTML = '';
  const colors = ['#f0c040','#ff6b35','#00e676','#2196f3','#e91e63','#9c27b0'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration: ${1.5 + Math.random()*2}s;
      animation-delay: ${Math.random()*1.5}s;
      width: ${4 + Math.random()*8}px;
      height: ${4 + Math.random()*8}px;
    `;
    container.appendChild(p);
  }
}

function startGame() {
  soundClick();
  initState();
  document.getElementById('help-change').disabled = false;
  document.getElementById('help-5050').disabled = false;
  const music = document.getElementById('bg-music');
  if (music.paused) {
    bgMusicStart();
  }
  showScreen('game-screen');
  bgMusicFadeTo(BG_MUSIC_LOW, 1000);
  renderQuestion();
}

function resetGame() {
  soundClick();
  bgMusicStart(); // reinicia desde el principio a volumen alto
  showSplash();
}

function showSplash() {
  // Oculta todas las pantallas
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.body.classList.remove('bg-intro', 'bg-game', 'bg-loss', 'bg-win');

  const splash = document.getElementById('splash-screen');
  const img    = document.getElementById('splash-img');
  const images = ['img/splash-1.webp', 'img/splash-2.webp'];

  splash.classList.add('visible');
  img.src = images[0];
  img.classList.remove('fade-out');

  // Después de 2s → fade out imagen 1
  setTimeout(() => {
    img.classList.add('fade-out');

    // Cuando termina el fade → cambia a imagen 2
    setTimeout(() => {
      img.src = images[1];
      img.classList.remove('fade-out');

      // Después de 2s → fade out imagen 2
      setTimeout(() => {
        img.classList.add('fade-out');

        // Cuando termina → oculta splash y muestra intro
        setTimeout(() => {
          splash.classList.remove('visible');
          showScreen('intro-screen');
        }, 600);
      }, 2000);
    }, 600);
  }, 2000);
}

// Init — arranca con el splash
initState();
showSplash();
</script>
</body>
